<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actividad 1 — Clasifica el Evento</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #4DB8A4;
    --teal-dark: #2E9B88;
    --teal-light: #E8F7F4;
    --navy: #1B2A4A;
    --blue: #2E8BC0;
    --blue-light: #EBF5FB;
    --purple: #7C3AED;
    --purple-light: #F5F3FF;
    --amber: #F59E0B;
    --amber-light: #FFFBEB;
    --red: #EF4444;
    --red-light: #FEF2F2;
    --green: #10B981;
    --green-light: #ECFDF5;
    --grey-100: #F8FAFC;
    --grey-200: #E2E8F0;
    --grey-400: #94A3B8;
    --grey-700: #334155;
    --white: #FFFFFF;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--grey-100);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 0;
  }

  .app {
    width: 100%;
    max-width: 680px;
    padding: 16px;
  }

  /* ── HEADER ── */
  .header {
    background: var(--navy);
    border-radius: 16px 16px 0 0;
    padding: 20px 24px 18px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(77,184,164,0.15);
  }
  .header-tag {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 6px;
  }
  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .header-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    background: rgba(255,255,255,0.08);
    border-radius: 0;
    padding: 10px 24px;
    background: var(--navy);
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-bar-bg {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--teal);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    white-space: nowrap;
    font-weight: 600;
  }
  .score-pill {
    background: rgba(77,184,164,0.2);
    color: var(--teal);
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }

  /* ── CARD ── */
  .card {
    background: var(--white);
    border-radius: 0 0 16px 16px;
    padding: 24px;
    box-shadow: 0 4px 24px rgba(27,42,74,0.08);
  }

  /* ── SCENARIO ── */
  .scenario-number {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 8px;
  }
  .scenario-box {
    background: var(--grey-100);
    border-left: 4px solid var(--teal);
    border-radius: 0 10px 10px 0;
    padding: 16px 18px;
    margin-bottom: 20px;
  }
  .scenario-icon {
    font-size: 28px;
    margin-bottom: 8px;
    display: block;
  }
  .scenario-text {
    font-size: 15px;
    font-weight: 500;
    color: var(--navy);
    line-height: 1.5;
  }

  /* ── QUESTION ── */
  .question {
    font-size: 13px;
    font-weight: 600;
    color: var(--grey-700);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }

  /* ── OPTION GRID ── */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .option-btn {
    border: 2px solid var(--grey-200);
    background: var(--white);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
    -webkit-tap-highlight-color: transparent;
  }
  .option-btn:active { transform: scale(0.97); }
  .option-btn.selected {
    border-color: var(--teal);
    background: var(--teal-light);
  }
  .option-btn.correct {
    border-color: var(--green);
    background: var(--green-light);
    animation: pulse-green 0.4s ease;
  }
  .option-btn.incorrect {
    border-color: var(--red);
    background: var(--red-light);
    animation: shake 0.35s ease;
  }
  .option-btn.reveal-correct {
    border-color: var(--green);
    background: var(--green-light);
  }
  @keyframes pulse-green {
    0% { transform: scale(1); }
    50% { transform: scale(1.03); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .option-badge {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-if { background: var(--teal-light); color: var(--teal-dark); }
  .badge-eve { background: var(--blue-light); color: var(--blue); }
  .badge-sre { background: var(--purple-light); color: var(--purple); }

  .option-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--grey-700);
    line-height: 1.3;
  }

  /* ── FEEDBACK ── */
  .feedback {
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 20px;
    display: none;
    animation: fadeSlideIn 0.3s ease;
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: var(--green-light); border-left: 4px solid var(--green); }
  .feedback.incorrect-fb { background: var(--red-light); border-left: 4px solid var(--red); }
  .feedback-title {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .feedback.correct-fb .feedback-title { color: var(--green); }
  .feedback.incorrect-fb .feedback-title { color: var(--red); }
  .feedback-body { font-size: 13px; color: var(--grey-700); line-height: 1.5; }

  /* ── BUTTONS ── */
  .btn-next {
    width: 100%;
    background: var(--teal);
    color: var(--white);
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: none;
    transition: background 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-next:active { background: var(--teal-dark); }
  .btn-next.show { display: block; }

  /* ── RESULTS SCREEN ── */
  .results {
    display: none;
    text-align: center;
  }
  .results.show { display: block; }
  .main-game { display: block; }
  .main-game.hide { display: none; }

  .results-emoji { font-size: 56px; margin-bottom: 12px; }
  .results-score {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 48px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1;
    margin-bottom: 6px;
  }
  .results-score span { color: var(--teal); }
  .results-label { font-size: 14px; color: var(--grey-400); margin-bottom: 24px; }
  .results-message {
    background: var(--teal-light);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 24px;
    font-size: 14px;
    color: var(--navy);
    line-height: 1.6;
    font-weight: 500;
  }
  .btn-restart {
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: 10px;
    padding: 14px 32px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.18s;
  }
  .btn-restart:active { opacity: 0.85; }

  .review-list { text-align: left; margin-bottom: 24px; }
  .review-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--grey-200);
    font-size: 13px;
  }
  .review-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .review-text { color: var(--grey-700); line-height: 1.4; }
  .review-text strong { color: var(--navy); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-tag">Módulo 1 · Actividad 1 de 2</div>
    <h1>¿Qué tipo de evento es?</h1>
    <div class="header-sub">Soneja Academy · Reporte y Análisis de Eventos</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressLabel">1 / 6</div>
    <div class="score-pill" id="scorePill">0 ✓</div>
  </div>

  <div class="card">
    <!-- MAIN GAME -->
    <div class="main-game" id="mainGame">
      <div class="scenario-number" id="scenarioNum">ESCENARIO 1</div>
      <div class="scenario-box">
        <span class="scenario-icon" id="scenarioIcon"></span>
        <div class="scenario-text" id="scenarioText"></div>
      </div>
      <div class="question">¿Cómo clasificarías este evento?</div>
      <div class="options" id="optionsContainer"></div>
      <div class="feedback" id="feedback">
        <div class="feedback-title" id="feedbackTitle"></div>
        <div class="feedback-body" id="feedbackBody"></div>
      </div>
      <button class="btn-next" id="btnNext">Siguiente escenario →</button>
    </div>

    <!-- RESULTS -->
    <div class="results" id="results">
      <div class="results-emoji" id="resultsEmoji"></div>
      <div class="results-score"><span id="resultsCorrect">0</span><span style="color:#94A3B8">/6</span></div>
      <div class="results-label">respuestas correctas</div>
      <div class="results-message" id="resultsMessage"></div>
      <div class="review-list" id="reviewList"></div>
      <button class="btn-restart" onclick="restart()">↩ Volver a intentarlo</button>
    </div>
  </div>
</div>

<script>
const scenarios = [
  {
    icon: '👷',
    text: 'Un operario tropieza con un cable suelto en el suelo del pasillo y cae al suelo. Se hace una herida en la rodilla que requiere que el ATS le cure y le ponga una gasa, pero puede seguir trabajando.',
    options: [
      { badge: 'IF3', label: 'Primera cura', color: 'if', correct: true },
      { badge: 'IF2', label: 'Accidente sin baja', color: 'if', correct: false },
      { badge: 'IF4', label: 'Incidente', color: 'if', correct: false },
      { badge: 'IF5', label: 'Condición insegura', color: 'if', correct: false },
    ],
    feedbackOK: '✅ Correcto — IF3. La herida requiere cura en el lugar de trabajo pero sin prescripción médica ni baja. Eso es exactamente un IF3: primera cura.',
    feedbackFail: '❌ No es correcto. La herida requiere atención en el lugar de trabajo por el ATS, pero sin prescripción médica ni baja. Eso es un IF3 — Primera cura. El IF2 requeriría tratamiento médico con prescripción.',
  },
  {
    icon: '🏭',
    text: 'Durante el turno de noche, una válvula de un depósito de aceite hidráulico falla y se produce un derrame de 180 litros que alcanza el desagüe de la planta antes de ser contenido.',
    options: [
      { badge: 'EVE1', label: 'Accidente ambiental grave', color: 'eve', correct: false },
      { badge: 'EVE2', label: 'Accidente ambiental significativo', color: 'eve', correct: true },
      { badge: 'EVE3', label: 'Accidente ambiental moderado', color: 'eve', correct: false },
      { badge: 'EVE4', label: 'Casi accidente ambiental', color: 'eve', correct: false },
    ],
    feedbackOK: '✅ Correcto — EVE2. El derrame supera los 100 litros y ha alcanzado el desagüe (impacto fuera del punto de origen). Eso lo sitúa en accidente ambiental significativo.',
    feedbackFail: '❌ No es correcto. El derrame es de 180 litros (entre 100 y 250 L) y ha llegado al desagüe. Eso es un EVE2 — Accidente ambiental significativo. El EVE1 requeriría más de 250 litros o impacto exterior a la planta.',
  },
  {
    icon: '🚜',
    text: 'Un carretillero detecta que la carretilla que va a usar tiene el cinturón de seguridad roto. Lo comunica al responsable de turno y no la usa, pero el vehículo queda en circulación porque hay otra persona que no se ha dado cuenta.',
    options: [
      { badge: 'IF4', label: 'Incidente', color: 'if', correct: false },
      { badge: 'IF5', label: 'Condición insegura', color: 'if', correct: true },
      { badge: 'SRE4', label: 'Incidente menor (SRE)', color: 'sre', correct: false },
      { badge: 'IF5', label: 'Acto inseguro', color: 'if', correct: false },
    ],
    feedbackOK: '✅ Correcto — IF5 Condición insegura. El cinturón roto es un estado del equipo que genera riesgo. Nadie ha resultado herido todavía, pero la situación peligrosa existe y debe reportarse.',
    feedbackFail: '❌ No es correcto. El cinturón roto es un estado físico del equipo que genera riesgo — eso es una condición insegura (IF5). Un acto inseguro sería el comportamiento de una persona. Un IF4 sería cuando el riesgo ya se ha manifestado como casi-accidente.',
  },
  {
    icon: '⚡',
    text: 'Por un fallo en el sistema eléctrico principal, la planta sufre una parada de producción que dura 26 horas. Los técnicos reparan el fallo sin intervención externa. No hay lesionados.',
    options: [
      { badge: 'SRE1', label: 'Incidente mayor', color: 'sre', correct: false },
      { badge: 'SRE2', label: 'Incidente significativo', color: 'sre', correct: true },
      { badge: 'SRE3', label: 'Incidente moderado', color: 'sre', correct: false },
      { badge: 'EVE3', label: 'Accidente ambiental moderado', color: 'eve', correct: false },
    ],
    feedbackOK: '✅ Correcto — SRE2. La parada supera las 24 horas (1 día laboral), lo que lo convierte en un incidente significativo para la continuidad del negocio.',
    feedbackFail: '❌ No es correcto. La parada es de 26 horas — supera el umbral de 24 horas del SRE3, así que es un SRE2 (incidente significativo). El SRE1 requeriría más de 96 horas o pérdidas superiores a 500.000€.',
  },
  {
    icon: '🪣',
    text: 'Durante una inspección de planta, el responsable de EHS observa que hay un bidón de disolvente almacenado justo debajo del cuadro eléctrico, sin cubeto de retención y a menos de un metro de la salida de emergencia.',
    options: [
      { badge: 'IF5', label: 'Acto inseguro', color: 'if', correct: false },
      { badge: 'EVE5', label: 'Condición insegura ambiental', color: 'eve', correct: false },
      { badge: 'IF5', label: 'Condición insegura', color: 'if', correct: false },
      { badge: 'IF5 + EVE5', label: 'IF5 + EVE5 (combinado)', color: 'if', correct: true },
    ],
    feedbackOK: '✅ Correcto — evento combinado IF5 + EVE5. El bidón bajo el cuadro eléctrico representa riesgo de incendio para personas (IF5 condición insegura) y riesgo de derrame sin contención (EVE5 condición insegura ambiental). Un mismo hallazgo puede generar múltiples reportes.',
    feedbackFail: '❌ Este es un evento combinado. El bidón genera dos tipos de riesgo: (1) riesgo de incendio para las personas → IF5 condición insegura, y (2) riesgo de derrame sin cubeto de retención → EVE5 condición insegura ambiental. En la aplicación EHS se registran ambos.',
  },
  {
    icon: '🤕',
    text: 'Un operario de mantenimiento sufre un corte profundo en la mano mientras trabaja sin guantes en una zona de piezas con bordes cortantes. El médico de empresa dictamina que no puede trabajar durante 3 días.',
    options: [
      { badge: 'IF1', label: 'Accidente con baja', color: 'if', correct: true },
      { badge: 'IF2', label: 'Accidente sin baja', color: 'if', correct: false },
      { badge: 'IF3', label: 'Primera cura', color: 'if', correct: false },
      { badge: 'IF1 + IF5', label: 'IF1 + IF5 (combinado)', color: 'if', correct: false },
    ],
    feedbackOK: '✅ Correcto — IF1. Hay dictamen médico oficial que impide trabajar durante más de 24 horas. El hecho de que no usara guantes es relevante para el análisis de causas, pero el evento se clasifica por su consecuencia: IF1.',
    feedbackFail: '❌ No es correcto. El médico ha dictaminado 3 días de baja — eso es un IF1 (accidente con baja). El hecho de que trabajara sin guantes es un acto inseguro que analizaremos en la investigación de causas, pero no cambia la clasificación del evento por su consecuencia.',
  },
];

let current = 0;
let score = 0;
let answered = false;
let userAnswers = [];

function render() {
  const s = scenarios[current];
  document.getElementById('scenarioNum').textContent = `ESCENARIO ${current + 1}`;
  document.getElementById('scenarioIcon').textContent = s.icon;
  document.getElementById('scenarioText').textContent = s.text;
  document.getElementById('progressFill').style.width = `${(current / scenarios.length) * 100}%`;
  document.getElementById('progressLabel').textContent = `${current + 1} / ${scenarios.length}`;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  s.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-badge badge-${opt.color}">${opt.badge}</span><span class="option-label">${opt.label}</span>`;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btnNext').className = 'btn-next';
  answered = false;
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const s = scenarios[current];
  const buttons = document.querySelectorAll('.option-btn');
  const isCorrect = s.options[idx].correct;

  userAnswers.push({ scenario: s, chosen: idx, correct: isCorrect });

  buttons[idx].classList.add(isCorrect ? 'correct' : 'incorrect');
  if (!isCorrect) {
    s.options.forEach((opt, i) => {
      if (opt.correct) buttons[i].classList.add('reveal-correct');
    });
  }

  if (isCorrect) score++;
  document.getElementById('scorePill').textContent = `${score} ✓`;

  const fb = document.getElementById('feedback');
  fb.className = `feedback show ${isCorrect ? 'correct-fb' : 'incorrect-fb'}`;
  document.getElementById('feedbackTitle').textContent = isCorrect ? '¡Bien hecho!' : 'No es correcto';
  document.getElementById('feedbackBody').textContent = isCorrect ? s.feedbackOK : s.feedbackFail;

  const btnNext = document.getElementById('btnNext');
  btnNext.className = 'btn-next show';
  btnNext.textContent = current < scenarios.length - 1 ? 'Siguiente escenario →' : 'Ver resultados →';
}

document.getElementById('btnNext').onclick = function () {
  current++;
  if (current < scenarios.length) {
    render();
  } else {
    showResults();
  }
};

function showResults() {
  document.getElementById('mainGame').className = 'main-game hide';
  document.getElementById('results').className = 'results show';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = `${scenarios.length} / ${scenarios.length}`;

  document.getElementById('resultsCorrect').textContent = score;

  let emoji, message;
  if (score === 6) {
    emoji = '🏆'; message = '¡Perfecto! Dominas la clasificación de eventos. Continúa con la Actividad 2 antes de completar el cuestionario final del módulo.';
  } else if (score >= 4) {
    emoji = '✅'; message = `Muy bien — ${score} de 6. Revisa los escenarios que fallaste y continúa con la Actividad 2.`;
  } else {
    emoji = '📚'; message = `${score} de 6. Te recomendamos repasar las tablas de clasificación y volver a intentarlo antes de continuar.`;
  }

  document.getElementById('resultsEmoji').textContent = emoji;
  document.getElementById('resultsMessage').textContent = message;

  const pct = Math.round((score / scenarios.length) * 100);

  if (pct >= 70) {
    const accessBox = document.createElement('div');
    accessBox.style.marginTop = '20px';
    accessBox.style.padding = '16px';
    accessBox.style.background = '#E8F7F4';
    accessBox.style.borderLeft = '4px solid #4DB8A4';
    accessBox.style.borderRadius = '10px';
    accessBox.style.fontSize = '14px';
    accessBox.style.fontWeight = '600';
    accessBox.innerHTML = 'Código de acceso para continuar el módulo:<br><span style="font-size:20px;font-weight:800;color:#1B2A4A;letter-spacing:2px;">Z4P9-L2K7</span>';
    document.getElementById('results').appendChild(accessBox);
  }

  const reviewList = document.getElementById('reviewList');
  reviewList.innerHTML = '';
  userAnswers.forEach((a, i) => {
    const item = document.createElement('div');
    item.className = 'review-item';
    const correctOpt = a.scenario.options.find(o => o.correct);
    item.innerHTML = `<span class="review-icon">${a.correct ? '✅' : '❌'}</span><div class="review-text"><strong>Escenario ${i+1}</strong> — Respuesta correcta: <strong>${correctOpt.badge} ${correctOpt.label}</strong></div>`;
    reviewList.appendChild(item);
  });
}

function restart() {
  current = 0; score = 0; answered = false; userAnswers = [];
  document.getElementById('results').className = 'results';
  document.getElementById('mainGame').className = 'main-game';
  document.getElementById('scorePill').textContent = '0 ✓';
  render();
}

render();
</script>
</body>
</html>
